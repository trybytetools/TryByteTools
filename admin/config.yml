## ──────────────────────────────────────────────────────────────────
##  TRY BYTE TOOLS — Decap CMS Configuration
## ──────────────────────────────────────────────────────────────────

backend:
  name: git-gateway
  branch: main
  # ↓ Replace with your Netlify site name (NOT your GitHub Pages URL)
  # Found at: Netlify dashboard → Site settings → General → Site information → Site name
  # e.g. if your Netlify URL is  https://trybytetools.netlify.app
  # then site_domain is:         trybytetools.netlify.app
  site_domain: boisterous-starship-a1d8ae.netlify.app

# Uncomment to test locally without auth:
# local_backend: true

media_folder:  "assets/uploads"
public_folder: "/assets/uploads"

collections:

  - name: settings
    label: "Studio Settings"
    files:
      - name: settings
        label: "Studio Settings"
        file: "data/settings.json"
        fields:
          - { label: "Studio Name",  name: studioName, widget: string }
          - { label: "Email",        name: email,      widget: string }
          - { label: "Site URL",     name: siteUrl,    widget: string }
          - { label: "Tagline",      name: tagline,    widget: text   }

  - name: projects
    label: "Projects"
    label_singular: "Project"
    folder: "data/projects"
    create: true
    slug: "{{id}}"
    identifier_field: title
    fields:
      - { label: "ID",          name: id,       widget: string }
      - { label: "Title",       name: title,    widget: string }
      - label: "Category"
        name: category
        widget: select
        options:
          - { label: "Unity Tool", value: unity   }
          - { label: "Game",       value: game    }
          - { label: "Web",        value: web     }
          - { label: "Python",     value: python  }
          - { label: "Android",    value: android }
          - { label: "AI",         value: ai      }
      - label: "Status"
        name: status
        widget: select
        options:
          - { label: "Live",     value: live     }
          - { label: "In Dev",   value: wip      }
          - { label: "Idea",     value: idea     }
          - { label: "Archived", value: archived }
      - { label: "Author",      name: author,   widget: string, required: false }
      - { label: "Version",     name: version,  widget: string, required: false }
      - { label: "Description", name: desc,     widget: text }
      - label: "Links"
        name: links
        widget: list
        required: false
        fields:
          - { label: "Label", name: label, widget: string }
          - { label: "URL",   name: href,  widget: string }
          - label: "Icon"
            name: icon
            widget: select
            options: [github, store]
      - label: "Patch Notes"
        name: patchNotes
        widget: list
        required: false
        fields:
          - { label: "Version", name: version, widget: string }
          - { label: "Date",    name: date,    widget: date, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD" }
          - { label: "Notes",   name: notes,   widget: text }

  - name: pipeline
    label: "Pipeline"
    label_singular: "Pipeline Entry"
    folder: "data/pipeline"
    create: true
    slug: "{{id}}"
    identifier_field: title
    fields:
      - { label: "ID",          name: id,            widget: string }
      - { label: "Title",       name: title,         widget: string }
      - label: "Type"
        name: type
        widget: select
        options:
          - { label: "Release", value: release }
          - { label: "Update",  value: update  }
          - { label: "Idea",    value: idea    }
      - { label: "Version",     name: version,       widget: string, required: false }
      - { label: "Description", name: desc,          widget: text }
      - { label: "Patch Notes URL", name: patchNotesUrl, widget: string, required: false }

  - name: team
    label: "Team"
    label_singular: "Team Member"
    folder: "data/team"
    create: true
    slug: "{{id}}"
    identifier_field: name
    fields:
      - { label: "ID",     name: id,     widget: string }
      - { label: "Name",   name: name,   widget: string }
      - { label: "Role",   name: role,   widget: string }
      - { label: "Avatar", name: avatar, widget: image, required: false }

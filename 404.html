<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Try Byte Tools</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%233d9eff'/%3E%3Cstop offset='1' stop-color='%2300baff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpolygon points='16,2 28,9 28,23 16,30 4,23 4,9' fill='url(%23g)'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='monospace' font-weight='900' font-size='14' fill='%23020a14'%3EB%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cyan: #00baff; --blue-b: #7dc8ff; --muted2: #6a8eaa;
      --border2: rgba(61,158,255,0.20); --text: #ddeeff;
    }
    body {
      background: #010610; color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .wrap { max-width: 520px; }
    .code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--cyan); margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.7rem;
    }
    .code::before, .code::after {
      content: ''; flex: 1; max-width: 40px; height: 1px;
      background: var(--cyan); box-shadow: 0 0 6px var(--cyan);
    }
    h1 {
      font-weight: 900; font-size: clamp(5rem, 18vw, 10rem);
      letter-spacing: -0.06em; line-height: 1;
      background: linear-gradient(135deg, #7dc8ff 0%, #00baff 60%, #60a5fa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 1.25rem;
    }
    p {
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
      color: var(--muted2); line-height: 1.9; margin-bottom: 2.5rem;
    }
    a {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
      font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.85rem 2rem; border-radius: 10px;
      background: linear-gradient(135deg, #3d9eff, #00baff);
      color: #020a14; text-decoration: none;
      box-shadow: 0 0 30px rgba(0,186,255,0.35);
      transition: transform .2s, box-shadow .2s;
    }
    a:hover { transform: translateY(-3px); box-shadow: 0 0 48px rgba(0,186,255,0.55); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">Error</div>
    <h1>404</h1>
    <p>This page doesn't exist.<br>It may have moved, or you followed a bad link.</p>
    <a href="/TryByteTools/">← Back to Home</a>
  </div>
</body>
</html>
